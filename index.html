<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dates Over the Years</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
</head>
<body>

    <header>
        <h1>Dates Over the Years</h1>
        <span class="subtitle">Commit History Analysis</span>
    </header>

    <main class="dashboard-grid">

        <!-- 1. Total Commits -->
        <div class="card stat-card">
            <div class="card-label">Total Commits</div>
            <div class="stat-value" id="total-count">—</div>
            <div class="stat-sub">entries recorded</div>
        </div>

        <!-- 2. First Date -->
        <div class="card stat-card">
            <div class="card-label">First Entry</div>
            <div class="stat-value" id="earliest-date">—</div>
            <div class="stat-sub">earliest date</div>
        </div>

        <!-- 3. Latest Date -->
        <div class="card stat-card">
            <div class="card-label">Latest Entry</div>
            <div class="stat-value" id="latest-date">—</div>
            <div class="stat-sub">most recent date</div>
        </div>

        <!-- 4. Donut Chart — Weekday Distribution -->
        <div class="card chart-card pie-card">
            <div class="card-label">Day-of-Week Distribution</div>
            <div class="pie-wrapper">
                <canvas id="weekday-pie"></canvas>
            </div>
        </div>

        <!-- 5. Column Chart by Year -->
        <div class="card chart-card year-card">
            <div class="card-label">Activity by Year</div>
            <canvas id="year-chart"></canvas>
        </div>

        <!-- 7. Top 3 Most Popular Months -->
        <div class="card topmonths-card">
            <div class="card-label">Top 3 Months</div>
            <div class="top-months-list" id="top-months-list"></div>
        </div>

        <!-- 6. Column Chart by Month -->
        <div class="card chart-card month-card">
            <div class="card-label">Activity by Month</div>
            <div class="month-scroll-wrap">
                <canvas id="month-year-chart"></canvas>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
